<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Regioni d'Italia</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #1a1a2e;
    color: #eee;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }
  h1 { font-size: 2rem; margin-bottom: 6px; color: #f0c040; letter-spacing: 1px; }

  #hud {
    display: flex; gap: 30px; margin-bottom: 14px;
    background: #16213e; padding: 12px 28px; border-radius: 12px;
    font-size: 1.1rem; font-weight: bold;
  }
  .hud-item span { color: #f0c040; }

  #controls { display: flex; gap: 12px; align-items: center; margin-bottom: 14px; }
  #status-msg { font-size: 0.95rem; color: #aaa; }

  #question-box {
    background: #16213e;
    border-radius: 14px;
    padding: 14px 28px;
    margin-bottom: 14px;
    font-size: 1.2rem;
    text-align: center;
    min-height: 52px;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.3s;
    width: 100%; max-width: 700px;
  }
  #question-box.correct { background: #1b4332; color: #6ee7b7; }
  #question-box.wrong   { background: #4c1130; color: #fca5a5; }

  #timer-bar-wrap {
    width: 100%; max-width: 700px;
    height: 8px; background: #16213e; border-radius: 10px; margin-bottom: 14px; overflow: hidden;
  }
  #timer-bar { height: 100%; border-radius: 10px; transition: width 0.1s linear, background 0.5s; width: 0%; }

  #map {
    width: 100%; max-width: 700px;
    height: 520px;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 4px 30px rgba(0,0,0,0.5);
  }

  button {
    background: #f0c040; color: #1a1a2e; border: none;
    padding: 10px 28px; border-radius: 10px; font-size: 1rem;
    font-weight: bold; cursor: pointer; transition: background 0.2s;
  }
  button:hover { background: #ffd700; }
  button:disabled { opacity: 0.5; cursor: default; }

  .leaflet-control-zoom a {
    background: #16213e !important;
    color: #f0c040 !important;
    border-color: #2d4a8a !important;
    font-weight: bold;
  }
  .leaflet-control-zoom a:hover { background: #2d4a8a !important; }
</style>
</head>
<body>

<h1>🇮🇹 Quiz Regioni d'Italia</h1>

<div id="hud">
  <div class="hud-item">Punteggio: <span id="score">0</span></div>
  <div class="hud-item">Domanda: <span id="qnum">0</span>/20</div>
  <div class="hud-item">Vite: <span id="lives">❤️❤️❤️</span></div>
</div>

<div id="controls">
  <button id="start-btn" disabled>⏳ Caricamento...</button>
  <span id="status-msg">Caricamento mappa satellitare...</span>
</div>

<div id="question-box">Trova le regioni sulla mappa!</div>
<div id="timer-bar-wrap"><div id="timer-bar"></div></div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const NAMES = {
  "Piemonte": "Piemonte",
  "Valle d'Aosta/Vallée d'Aoste": "Valle d'Aosta",
  "Lombardia": "Lombardia",
  "Trentino-Alto Adige/Südtirol": "Trentino-Alto Adige",
  "Veneto": "Veneto",
  "Friuli-Venezia Giulia": "Friuli-Venezia Giulia",
  "Liguria": "Liguria",
  "Emilia-Romagna": "Emilia-Romagna",
  "Toscana": "Toscana",
  "Umbria": "Umbria",
  "Marche": "Marche",
  "Lazio": "Lazio",
  "Abruzzo": "Abruzzo",
  "Molise": "Molise",
  "Campania": "Campania",
  "Puglia": "Puglia",
  "Basilicata": "Basilicata",
  "Calabria": "Calabria",
  "Sicilia": "Sicilia",
  "Sardegna": "Sardegna"
};

const REGIONI = Object.values(NAMES);

const STYLE_DEFAULT  = { color: '#5a85cc', weight: 1.5, fillColor: '#2d4a8a', fillOpacity: 0.35 };
const STYLE_HOVER    = { fillColor: '#4a72c0', fillOpacity: 0.55 };
const STYLE_TARGET   = { color: '#f0c040', weight: 2.5, fillColor: '#b8940a', fillOpacity: 0.5 };
const STYLE_CORRECT  = { color: '#6ee7b7', weight: 2,   fillColor: '#22c87a', fillOpacity: 0.6 };
const STYLE_WRONG    = { color: '#fca5a5', weight: 2,   fillColor: '#e05050', fillOpacity: 0.6 };

let queue = [], current = null, score = 0, lives = 3, qnum = 0;
let timerInterval = null, timeLeft = 10, answering = false;
const TOTAL = 20, TIME = 10;
let bestScores = JSON.parse(localStorage.getItem('quiz-italia-best') || '[]');
let mapLoaded = false;
let geoLayer = null;

function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

// Inizializza la mappa Leaflet con tile satellite ESRI (gratuiti, no API key)
const map = L.map('map', { zoomControl: true, dragging: true, scrollWheelZoom: true, minZoom: 5, maxZoom: 10, wheelPxPerZoomLevel: 150, zoomSnap: 0.25 })
              .setView([42.5, 12.5], 6);

L.tileLayer(
  'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
  { attribution: 'Tiles &copy; Esri &mdash; Source: Esri, i-cubed, USDA, USGS, AEX, GeoEye, Getmapping, Aerogrid, IGN, IGP, UPR-EGP, and the GIS User Community' }
).addTo(map);

async function loadMap() {
  try {
    const res = await fetch('https://raw.githubusercontent.com/openpolis/geojson-italy/master/geojson/limits_IT_regions.geojson');
    const data = await res.json();

    geoLayer = L.geoJSON(data, {
      style: STYLE_DEFAULT,
      onEachFeature(feature, layer) {
        const name = NAMES[feature.properties.reg_name] || feature.properties.reg_name;
        layer.options.regionName = name;

        layer.on('mouseover', function() {
          if (!answering) return;
          const s = this.options.currentStyle || STYLE_DEFAULT;
          if (s === STYLE_DEFAULT) this.setStyle(STYLE_HOVER);
        });
        layer.on('mouseout', function() {
          if (!answering) return;
          const s = this.options.currentStyle;
          if (!s || s === STYLE_DEFAULT) this.setStyle(STYLE_DEFAULT);
        });
        layer.on('click', function() { onRegionClick(this); });
      }
    }).addTo(map);

    mapLoaded = true;
    document.getElementById('start-btn').disabled = false;
    document.getElementById('start-btn').textContent = '▶ Inizia!';
    document.getElementById('status-msg').textContent = 'Clicca Inizia per cominciare';

  } catch(e) {
    document.getElementById('status-msg').textContent = 'Errore caricamento mappa. Controlla la connessione.';
    console.error(e);
  }
}

function resetAllStyles() {
  if (!geoLayer) return;
  geoLayer.eachLayer(l => {
    l.options.currentStyle = STYLE_DEFAULT;
    l.setStyle(STYLE_DEFAULT);
  });
}

function startGame() {
  if (!mapLoaded) return;
  score = 0; lives = 3; qnum = 0;
  queue = shuffle(REGIONI);
  resetAllStyles();
  document.getElementById('status-msg').textContent = '';
  document.getElementById('start-btn').textContent = '▶ Ricomincia';
  updateHUD();
  nextQuestion();
}

function updateHUD() {
  document.getElementById('score').textContent = score;
  document.getElementById('qnum').textContent = qnum;
  document.getElementById('lives').textContent = '❤️'.repeat(lives) + '🖤'.repeat(3 - lives);
}

function nextQuestion() {
  clearInterval(timerInterval);

  // Rimuove solo i colori temporanei (wrong), lascia i correct-hit
  geoLayer.eachLayer(l => {
    if (l.options.currentStyle === STYLE_WRONG || l.options.currentStyle === STYLE_TARGET) {
      l.options.currentStyle = STYLE_DEFAULT;
      l.setStyle(STYLE_DEFAULT);
    }
  });

  if (qnum >= TOTAL || lives <= 0) { endGame(); return; }

  if (!queue.length) queue = shuffle(REGIONI);
  current = queue.shift();
  qnum++;
  answering = true;

  const qbox = document.getElementById('question-box');
  qbox.className = '';
  qbox.textContent = `Clicca sulla regione: ${current}`;

  timeLeft = TIME;
  updateTimerBar();
  timerInterval = setInterval(() => {
    timeLeft -= 0.1;
    if (timeLeft <= 0) { timeLeft = 0; updateTimerBar(); onTimeout(); }
    else updateTimerBar();
  }, 100);

  updateHUD();
}

function updateTimerBar() {
  const pct = Math.max(0, (timeLeft / TIME) * 100);
  const bar = document.getElementById('timer-bar');
  bar.style.width = pct + '%';
  bar.style.background = pct > 50 ? '#f0c040' : pct > 25 ? '#f97316' : '#ef4444';
}

function highlightTarget() {
  geoLayer.eachLayer(l => {
    if (l.options.regionName === current) {
      l.options.currentStyle = STYLE_TARGET;
      l.setStyle(STYLE_TARGET);
    }
  });
}

function onTimeout() {
  if (!answering) return;
  answering = false;
  clearInterval(timerInterval);
  lives--;
  const qbox = document.getElementById('question-box');
  qbox.className = 'wrong';
  qbox.textContent = `⏱️ Tempo scaduto! Era: ${current}`;
  highlightTarget();
  updateHUD();
  setTimeout(nextQuestion, 2000);
}

function onRegionClick(layer) {
  if (!answering) return;
  answering = false;
  clearInterval(timerInterval);
  const qbox = document.getElementById('question-box');

  if (layer.options.regionName === current) {
    const bonus = Math.round(timeLeft);
    score += 10 + bonus;
    qbox.className = 'correct';
    qbox.textContent = `✅ Corretto! +${10 + bonus} punti (bonus tempo: +${bonus})`;
    layer.options.currentStyle = STYLE_CORRECT;
    layer.setStyle(STYLE_CORRECT);
  } else {
    lives--;
    qbox.className = 'wrong';
    qbox.textContent = `❌ Sbagliato! Era: ${current}`;
    layer.options.currentStyle = STYLE_WRONG;
    layer.setStyle(STYLE_WRONG);
    highlightTarget();
  }
  updateHUD();
  setTimeout(nextQuestion, 1800);
}

function endGame() {
  clearInterval(timerInterval);
  answering = false;
  bestScores.push(score);
  bestScores.sort((a, b) => b - a);
  bestScores = bestScores.slice(0, 5);
  localStorage.setItem('quiz-italia-best', JSON.stringify(bestScores));

  const qbox = document.getElementById('question-box');
  qbox.className = lives > 0 ? 'correct' : 'wrong';
  qbox.textContent = lives > 0 ? `🏆 Completato! Punteggio: ${score}` : `💔 Game Over! Punteggio: ${score}`;
  document.getElementById('status-msg').textContent = 'Migliori: ' + bestScores.join(' · ');
}

document.getElementById('start-btn').addEventListener('click', startGame);
loadMap();
</script>
</body>
</html>
